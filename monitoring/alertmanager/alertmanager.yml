global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'sns-alerts'

receivers:
  - name: 'sns-alerts'
    webhook_configs:
      - url: 'http://localhost:5001/sns' # Mock or local SNS integration endpoint
        send_resolved: true

  - name: 'email-alerts'
    email_configs:
      - to: 'admin@company.com'
        from: 'alertmanager@company.com'
        smarthost: 'smtp.example.com:587'
        auth_username: 'smtp_user'
        auth_password: 'smtp_password'
        require_tls: true
