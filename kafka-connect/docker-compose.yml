version: "3.8"

# ==============================================================================
# Local end-to-end simulation of the hackathon pipeline
#   Postgres (on-prem sim, WAL enabled)
#        -> Debezium CDC source connector
#        -> Kafka (KRaft mode, no Zookeeper needed)
#        -> Snowflake Kafka Sink connector (loads Bronze/RAW table)
# In real AWS deployment: Kafka = MSK, Connect = MSK Connect / EC2, this is a
# 1:1 local stand-in so you can develop & demo before pointing at AWS.
# ==============================================================================

services:

  # ---------------------------------------------------------------------
  # Kafka broker (KRaft mode - no Zookeeper). Stands in for AWS MSK.
  # ---------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "hackathon-iot-cluster-01"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------
  # PostgreSQL = on-premise DB simulation (EC2 in the real architecture)
  # WAL logical replication enabled -> required by Debezium
  # ---------------------------------------------------------------------
  postgres:
    image: debezium/postgres:16
    container_name: postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: iot_admin
      POSTGRES_PASSWORD: iot_password
      POSTGRES_DB: iot_db
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=10"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../phase1-postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot_admin -d iot_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------
  # Kafka Connect worker running:
  #   - Debezium PostgreSQL CDC source connector
  #   - Snowflake Kafka Sink connector
  #   - (optional) Confluent JDBC Sink + S3 Sink connectors
  # ---------------------------------------------------------------------
  kafka-connect:
    image: debezium/connect:2.6
    container_name: kafka-connect
    hostname: kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: iot-connect-cluster
      CONFIG_STORAGE_TOPIC: _iot_connect_configs
      OFFSET_STORAGE_TOPIC: _iot_connect_offsets
      STATUS_STORAGE_TOPIC: _iot_connect_status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    volumes:
      # Drop the Snowflake Kafka Connector + JDBC + S3 sink jars here.
      # Download links are documented in README.md -> "Connector plugin jars"
      - ./plugins:/kafka/connect/plugins
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 10s
      timeout: 10s
      retries: 15

  # ---------------------------------------------------------------------
  # Web UI to inspect topics / messages / connectors (handy for the demo)
  # ---------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
      - kafka-connect
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: hackathon-iot
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083

volumes:
  kafka-data:
  postgres-data:
