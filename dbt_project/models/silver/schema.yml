version: 2

models:
  - name: silver_iot_events
    description: "Cleaned, deduplicated, validated IoT events (Silver layer)."
    columns:
      - name: event_uid
        description: "Surrogate key: device_id + kafka partition + kafka offset."
        tests:
          - unique
          - not_null
      - name: device_id
        tests:
          - not_null
      - name: latitude
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: -90
              max_value: 90
      - name: longitude
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: -180
              max_value: 180
      - name: severity
        tests:
          - accepted_values:
              values: ['normal', 'warning', 'critical', 'unknown']
      - name: event_ts
        tests:
          - not_null
