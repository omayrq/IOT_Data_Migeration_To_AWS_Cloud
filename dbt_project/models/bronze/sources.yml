version: 2

sources:
  - name: raw
    database: HACKATHON_IOT
    schema: RAW
    tables:
      - name: iot_events
        identifier: IOT_EVENTS
        description: >
          Bronze layer. Loaded directly by the Snowflake Kafka Connector from the
          cdc.public.iot_events topic (Debezium CDC output). Two VARIANT columns:
          RECORD_METADATA (Kafka metadata) and RECORD_CONTENT (unwrapped row).
        loaded_at_field: "RECORD_METADATA:CreateTime::timestamp_ntz"
        freshness:
          warn_after: {count: 5, period: minute}
          error_after: {count: 30, period: minute}
